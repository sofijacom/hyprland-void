name: Update template
run-name: "Automated update of ${{ github.ref_name }} by @${{ github.actor }}"

on:
  schedule:
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  find-autoupdates:
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/master' }}
    outputs:
      matrix: ${{ steps.collect.outputs.matrix }}
      pkgs: ${{ steps.collect.outputs.pkgs }}
    steps:
      - uses: actions/checkout@v6

      - uses: dcarbone/install-jq-action@v3.2.0

      - name: Find autoupdate scripts
        id: collect
        run: |
          updates=$(find srcpkgs -mindepth 2 -maxdepth 2 -type f -name update.sh)
          if [ -z "$updates" ]; then
            printf "matrix=[]\npkgs=[]\n" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          while read path; do
            dir=$(dirname "$path")
            pkg=$(basename "$dir")
            printf '{"dir":"%s","name":"%s","path":"%s"}\n' "$dir" "$pkg" "$path"
          done <<< "${updates}" | jq -cs > matrix.json

          # separat lista med bara pkg-namn
          jq -c 'map(.name)' matrix.json > pkgs.json

          echo "matrix=$(cat matrix.json)" >> "$GITHUB_OUTPUT"
          echo "pkgs=$(cat pkgs.json)" >> "$GITHUB_OUTPUT"

  update-versions:
    name: update ${{ matrix.pkg.name }}
    runs-on: ubuntu-latest
    needs: find-autoupdates
    if: ${{ needs.find-autoupdates.outputs.matrix != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        pkg: ${{ fromJson(needs.find-autoupdates.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ secrets.PULL_PUSH }}

      - uses: dcarbone/install-jq-action@v3.2.0

      - name: Run updates
        run: bash "${{ matrix.pkg.path }}"
        env:
          GH_TOKEN: ${{ github.token }}
        continue-on-error: true

      - uses: actions/upload-artifact@v7
        name: upload template
        if: always()
        with:
          name: ${{ matrix.pkg.name }}
          path: ${{ matrix.pkg.dir }}

  commit-updates:
    runs-on: ubuntu-latest
    needs:
      - update-versions
    if: always()
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
          fetch-depth: 0
          token: ${{ secrets.PULL_PUSH }}

      - uses: actions/download-artifact@v8
        with:
          path: ./srcpkgs

      - name: Updated templates summary
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Updated Templates" >> "$GITHUB_STEP_SUMMARY"

          changed=$(git diff --name-only | grep 'srcpkgs/.*/template$' || true)

          if [ -z "$changed" ]; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "No template changes detected." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "### Changed files" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "$changed" | while read file; do
              pkg=$(echo "$file" | cut -d'/' -f2)
              echo "- **$pkg** → \`$file\`" >> "$GITHUB_STEP_SUMMARY"
            done
          fi

      - name: Diff preview
        run: |
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "## Diff Preview" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          diff_output=$(git diff --patch --minimal | sed 's/^/    /')

          if [ -z "$diff_output" ]; then
            echo "No diff available." >> "$GITHUB_STEP_SUMMARY"
          else
            echo "<details><summary>Click to expand diff</summary>" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```diff' >> "$GITHUB_STEP_SUMMARY"
            echo "$diff_output" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            echo "</details>" >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: commit updates
        id: check-updates
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git commit --all --message "Automated update"
            echo "has_updates=true" >> "$GITHUB_OUTPUT"
          else
            echo "No new updates"
            echo "has_updates=false" >> "$GITHUB_OUTPUT"
          fi

      - name: push updates
        if: steps.check-updates.outputs.has_updates == 'true'
        uses: ad-m/github-push-action@v1.1.0
        with:
          github_token: ${{ secrets.PULL_PUSH }}
          branch: ${{ github.ref }}
